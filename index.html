<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Tujuan</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
      background: white;
      padding: 50px 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      margin-bottom: 30px;
      color: #333;
    }

    .btn {
      display: block;
      width: 220px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn1 {
      background: #667eea;
    }

    .btn2 {
      background: #764ba2;
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Pilih Tujuan</h1>

    <a href="https://jktkemanggisan.infinityfreeapp.com/card/gmap.php?idc=186" class="btn btn1">Daerah Dinas 1</a>
    <a href="https://jktkemanggisan.infinityfreeapp.com/card/gmap.php?idc=187" class="btn btn2">Daerah Dinas 2</a>

  </div>
</body>

</html>
